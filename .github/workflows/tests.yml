name: GitHub Actions CI

on:
  push:
    branches:
      - main
  pull_request:

defaults:
  run:
    shell: bash -xeuo pipefail {0}

permissions:
  contents: read

jobs:
  style:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          core: false
          cask: false

      - name: Cache Homebrew prefix
        uses: Homebrew/actions/cache-homebrew-prefix@main
        with:
          brewfile: true
          uninstall: true

      - name: Set up Ruby
        uses: Homebrew/actions/setup-ruby@main
        with:
          bundler-cache: true

      - run: script/style
        env:
          # Used by zizmor
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rspec:
    runs-on: ubuntu-latest
    needs: style
    steps:
      - name: Set up Git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Homebrew
        id: setup-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          core: false
          cask: false

      - name: Cache Homebrew prefix
        uses: Homebrew/actions/cache-homebrew-prefix@main
        with:
          brewfile: true
          uninstall: true

      - name: Set up Ruby
        uses: Homebrew/actions/setup-ruby@main
        with:
          bundler-cache: true

      - name: Build Tailwind CSS
        run: bin/rails tailwindcss:build

      - name: Run RSpec tests
        run: bin/rspec

  strap_sh:
    runs-on: macos-15
    steps:
      - name: Set up Git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cleanup macOS
        run: sudo rm -rf /opt/homebrew /Applications/Xcode.app /Library/Developer/CommandLineTools

      - run: bin/strap.sh
        env:
          STRAP_CI: 1
          STRAP_DEBUG: 1

      - name: Rerun bin/strap.sh
        run: bin/strap.sh
        env:
          STRAP_CI: 1

      - run: brew config

      - run: brew doctor

      - name: Test various brew installations
        run: |
          brew install --build-from-source --formula libfaketime
          brew install --cask orka
          brew install --formula xz
